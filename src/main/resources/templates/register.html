<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - HANCOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>

<div class="register-container">
    <h2 class="register-title">Đăng ký tài khoản</h2>
    
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <div class="mb-3">
            <label for="tenDangNhap" class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control" id="tenDangNhap" th:field="*{tenDangNhap}" required placeholder="user123">
            </div>
        </div>

        <div class="mb-3">
            <label for="matKhau" class="form-label">Mật khẩu <span class="text-danger">*</span></label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" id="matKhau" th:field="*{matKhau}" required placeholder="••••••••">
            </div>
        </div>

        <div class="mb-3">
            <label for="hoTen" class="form-label">Họ và tên <span class="text-danger">*</span></label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                <input type="text" class="form-control" id="hoTen" th:field="*{hoTen}" required placeholder="Nguyễn Văn A">
            </div>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control" id="email" th:field="*{email}" required placeholder="example@gmail.com">
            </div>
        </div>

        <div class="mb-3">
            <label for="soDienThoai" class="form-label">Số điện thoại</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="text" class="form-control" id="soDienThoai" th:field="*{soDienThoai}" placeholder="0987654321">
            </div>
        </div>
        
        <button type="submit" class="btn btn-register">Đăng ký</button>
    </form>
    
    <div class="text-center mt-4">
        <p class="small text-muted">Đã có tài khoản? <a th:href="@{/login}" class="text-decoration-none" style="color: #8b4d4d; font-weight: 600;">Đăng nhập ngay</a></p>
        <a th:href="@{/}" class="text-decoration-none text-muted small"><i class="fas fa-arrow-left me-1"></i> Quay lại trang chủ</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
