<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quên mật khẩu - Hancos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
        }
        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .btn-primary {
            background: #111;
            border-color: #111;
        }
        .btn-primary:hover {
            background: #000;
            border-color: #000;
        }
    </style>
</head>
<body>

<div class="container" style="min-height: 100vh; display: flex; align-items: center;">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center" style="width: 56px; height: 56px;">
                            <i class="fas fa-unlock-alt"></i>
                        </div>
                        <h4 class="fw-700 mt-3">Quên mật khẩu</h4>
                        <p class="text-muted small mb-0">Nhập email để nhận link đặt lại mật khẩu</p>
                    </div>

                    <div id="alertBox" class="alert d-none" role="alert"></div>

                    <form id="forgotForm">
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-600">Email</label>
                            <input type="email" class="form-control" name="email" required placeholder="example@gmail.com">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Gửi yêu cầu</button>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/login}" class="small text-muted">Quay lại đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('forgotForm');
    const alertBox = document.getElementById('alertBox');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertBox.classList.add('d-none');

        const formData = new FormData(form);
        const email = formData.get('email');

        try {
            const res = await fetch('/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();
            alertBox.className = 'alert alert-success';
            alertBox.textContent = data.message || 'Nếu email tồn tại, hệ thống đã gửi link đặt lại mật khẩu.';
            alertBox.classList.remove('d-none');
            form.reset();
        } catch (err) {
            alertBox.className = 'alert alert-danger';
            alertBox.textContent = 'Có lỗi xảy ra. Vui lòng thử lại.';
            alertBox.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
