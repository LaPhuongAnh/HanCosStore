<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh mục - HANCOS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/categories.css}">
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar('categories')}"></div>
<div class="main-content">
    <header class="top-header">
        <h4 class="fw-800 mb-0 text-uppercase letter-spacing-1">Quản lý danh mục</h4>
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/admin/categories/add}" class="btn btn-dark rounded-0 fw-700 text-uppercase small letter-spacing-1 px-4 py-2">
                <i class="fas fa-plus me-2"></i> Thêm danh mục
            </a>
            <div class="rounded-circle bg-soft-primary d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                <i class="fas fa-user-shield"></i>
            </div>
        </div>
    </header>

    <div th:if="${successMessage}" class="alert alert-success border-0 rounded-0 small mb-4" th:text="${successMessage}"></div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4" style="width: 80px;">ID</th>
                            <th>Mã</th>
                            <th>Tên danh mục</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th class="text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <th:block th:each="parent : ${categories}">
                            <!-- Parent Category -->
                            <tr class="table-group-divider">
                                <td class="ps-4 fw-700 text-dark" th:text="${parent.id}">1</td>
                                <td><code class="fw-700" th:text="${parent.ma}">DM001</code></td>
                                <td>
                                    <div class="fw-800 text-uppercase text-dark" th:text="${parent.ten}">Danh mục cha</div>
                                    <small class="text-muted small text-uppercase" style="font-size: 9px; letter-spacing: 1px;">Danh mục cấp 1</small>
                                </td>
                                <td>
                                    <span class="badge rounded-pill px-3 py-2" 
                                          th:classappend="${parent.trangThai == 'ACTIVE' ? 'badge-active' : 'badge-inactive'}"
                                          th:text="${parent.trangThai}">ACTIVE</span>
                                </td>
                                <td class="small text-muted" th:text="${#temporals.format(parent.ngayTao, 'dd/MM/yyyy')}">01/01/2026</td>
                                <td class="text-end pe-4">
                                    <div class="d-flex justify-content-end gap-2">
                                        <a th:href="@{/admin/categories/edit/{id}(id=${parent.id})}" class="btn-action" title="Chỉnh sửa">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <button class="btn-action btn-delete" title="Xóa" th:onclick="'deleteCategory(' + ${parent.id} + ')'">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <!-- Child Categories -->
                            <tr th:each="child : ${parent.danhMucCon}" class="category-child">
                                <td class="ps-5 text-muted small" th:text="${child.id}">2</td>
                                <td class="ps-3"><code class="text-muted" th:text="${child.ma}">DM002</code></td>
                                <td class="ps-3">
                                    <i class="fas fa-level-up-alt fa-rotate-90 me-2 text-muted opacity-50"></i>
                                    <span class="fw-600 text-dark" th:text="${child.ten}">Danh mục con</span>
                                </td>
                                <td>
                                    <span class="badge rounded-pill px-3 py-2" 
                                          th:classappend="${child.trangThai == 'ACTIVE' ? 'badge-active' : 'badge-inactive'}"
                                          th:text="${child.trangThai}">ACTIVE</span>
                                </td>
                                <td class="small text-muted" th:text="${#temporals.format(child.ngayTao, 'dd/MM/yyyy')}">01/01/2026</td>
                                <td class="text-end pe-4">
                                    <div class="d-flex justify-content-end gap-2">
                                        <a th:href="@{/admin/categories/edit/{id}(id=${child.id})}" class="btn-action" title="Chỉnh sửa">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <button class="btn-action btn-delete" title="Xóa" th:onclick="'deleteCategory(' + ${child.id} + ')'">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </th:block>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                <i class="fas fa-folder-open fa-3x mb-3 d-block opacity-20"></i>
                                Chưa có danh mục nào được tạo.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 p-3 border-top">
                <div class="small text-muted">
                    Trang <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">1</span>
                </div>
                <nav th:if="${totalPages > 1}" aria-label="Category pagination">
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${currentPage == 1} ? ' disabled'">
                            <a class="page-link" th:href="@{/admin/categories(page=${currentPage - 1}, size=${pageSize})}">
                                Trước
                            </a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                            th:classappend="${i == currentPage} ? ' active'">
                            <a class="page-link" th:href="@{/admin/categories(page=${i}, size=${pageSize})}" th:text="${i}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? ' disabled'">
                            <a class="page-link" th:href="@{/admin/categories(page=${currentPage + 1}, size=${pageSize})}">
                                Sau
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/admin/categories.js}"></script>
</body>
</html>
