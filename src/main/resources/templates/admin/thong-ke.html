<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê doanh thu - HANCOS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" th:href="@{/css/admin/thong-ke.css}">
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar('thongke')}"></div>

<div class="main-content">
    <header class="top-header">
        <h4 class="fw-800 mb-0 text-uppercase letter-spacing-1">Thống kê doanh thu</h4>
        <div class="rounded-circle bg-soft-primary d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
            <i class="fas fa-chart-line"></i>
        </div>
    </header>

    <div class="card">
        <div class="card-body p-4">
            <form class="row g-3 align-items-center">
                <div class="col-md-3">
                    <label class="form-label fw-700">Từ ngày</label>
                    <input type="date" class="form-control" id="tuNgay">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-700">Đến ngày</label>
                    <input type="date" class="form-control" id="denNgay">
                </div>
                <div class="col-md-6">
                    <div class="d-flex gap-2 flex-wrap align-items-end" style="margin-top: 1.9rem;">
                        <button type="button" class="btn btn-dark" onclick="updateStatistics()">Lọc</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="resetFilter()">Reset</button>
                        <button type="button" class="btn btn-outline-primary" onclick="quickFilter(0)">Hôm nay</button>
                        <button type="button" class="btn btn-outline-primary" onclick="quickFilter(1)">1 ngày trước</button>
                        <button type="button" class="btn btn-outline-primary" onclick="quickFilter(3)">3 ngày trước</button>
                        <button type="button" class="btn btn-outline-primary" onclick="quickFilter(7)">7 ngày trước</button>
                        <button type="button" class="btn btn-success ms-auto" onclick="exportExcel()">
                            <i class="fas fa-file-excel me-1"></i> Xuất Excel
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h6>Doanh thu thực tế</h6>
                    <h2 id="doanhThuThucTe">...</h2>
                </div>
            </div>
        </div>


    </div>

    <div class="row mt-3">
        <div class="col-md-6">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <h6>Đơn hàng trong kỳ</h6>
                    <h2 id="soDonTrongKy">...</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-4">
        <div class="card-header bg-white fw-bold d-flex justify-content-between">
            <span>Biểu đồ doanh thu theo ngày</span>
            <span id="chartLabel" class="text-muted small">Tất cả thời gian</span>
        </div>
        <div class="card-body">
            <canvas id="doanhThuChart" height="100"></canvas>
        </div>
    </div>
</div>

<script th:src="@{/js/admin/thong-ke.js}"></script>
</body>
</html>
