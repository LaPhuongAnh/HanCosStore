<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category.id == null ? 'Thêm danh mục' : 'Sửa danh mục'} + ' - HANCOS'">Danh mục</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/category-form.css}">
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar('categories')}"></div>

<div class="main-content">
    <header class="top-header">
        <div class="d-flex align-items-center">
            <a th:href="@{/admin/categories}" class="btn-action me-3" aria-label="Quay lại">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h4 class="fw-800 mb-0 text-uppercase letter-spacing-1"
                th:text="${category.id == null ? 'Thêm danh mục' : 'Sửa danh mục'}">Danh mục</h4>
        </div>
        <div class="rounded-circle bg-soft-primary d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
            <i class="fas fa-user-shield"></i>
        </div>
    </header>

    <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-0 small mb-4" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body p-4">
            <form th:action="@{/admin/categories/save}" th:object="${category}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}">

                <div class="col-md-6">
                    <label class="form-label fw-700">Mã danh mục <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{ma}" required placeholder="VD: AO_NAM">
                    <small class="text-muted">Mã này dùng để phân loại và không được trùng lặp.</small>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-700">Tên danh mục <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{ten}" required placeholder="VD: Áo Nam">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-700">Danh mục cha</label>
                    <select class="form-select" th:field="*{danhMucChaId}">
                        <option value="">-- Là danh mục cấp 1 (Cha) --</option>
                        <option th:each="p : ${parents}"
                                th:if="${p.id != category.id}"
                                th:value="${p.id}"
                                th:text="${p.ten}">Danh mục cha</option>
                    </select>
                    <small class="text-muted">Để trống nếu đây là danh mục cao nhất.</small>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-700">Trạng thái</label>
                    <select class="form-select" th:field="*{trangThai}">
                        <option value="ACTIVE">Hoạt động (ACTIVE)</option>
                        <option value="INACTIVE">Ngưng hoạt động (INACTIVE)</option>
                    </select>
                </div>

                <div class="col-12 mt-3 pt-3 border-top">
                    <button type="submit" class="btn btn-primary px-5 py-2 fw-700">
                        <i class="fas fa-save me-2"></i> Lưu danh mục
                    </button>
                    <a th:href="@{/admin/categories}" class="btn btn-outline-secondary px-4 py-2 ms-2">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
