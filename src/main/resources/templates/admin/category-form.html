<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category.id == null ? 'Thêm danh mục' : 'Sửa danh mục'} + ' - HANCOS'">Danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #8b4d4d; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: white; min-height: 100vh; border-right: 1px solid #eee; padding: 2rem 1rem; }
        .main-content { padding: 2rem; }
        .card { border: none; border-radius: 10px; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
        .btn-primary:hover { background-color: #6d3838; border-color: #6d3838; }
        .nav-link { color: #333; font-weight: 500; margin-bottom: 0.5rem; border-radius: 5px; }
        .nav-link:hover { background: #f8f9fa; color: var(--primary-color); }
        .nav-link.active { background: var(--primary-color); color: white !important; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar">
            <h3 class="text-center fw-bold mb-4" style="letter-spacing: 2px;">HANCOS</h3>
            <nav class="nav flex-column">
                <a class="nav-link" th:href="@{/}"><i class="fas fa-home me-2"></i> Trang chủ</a>
                <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                <a class="nav-link" th:href="@{/san-pham}"><i class="fas fa-box me-2"></i> Sản phẩm</a>
                <a class="nav-link active" th:href="@{/admin/categories}"><i class="fas fa-list me-2"></i> Danh mục</a>
                <a class="nav-link" th:href="@{/admin/thong-ke}"><i class="fas fa-chart-line me-2"></i> Thống kê</a>
                <a class="nav-link" th:href="@{/admin/orders}"><i class="fas fa-shopping-cart me-2"></i> Đơn hàng</a>
                <a class="nav-link" th:href="@{/admin/users}"><i class="fas fa-users me-2"></i> Tài khoản</a>
                <hr>
                <a class="nav-link text-danger" th:href="@{/logout}"><i class="fas fa-sign-out-alt me-2"></i> Đăng xuất</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 main-content">
            <div class="mb-4">
                <a th:href="@{/admin/categories}" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại danh sách
                </a>
                <h2 class="fw-bold mt-2" th:text="${category.id == null ? 'THÊM DANH MỤC MỚI' : 'CHỈNH SỬA DANH MỤC'}"></h2>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card">
                <div class="card-body p-4">
                    <form th:action="@{/admin/categories/save}" method="post" th:object="${category}">
                        <input type="hidden" th:field="*{id}">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Mã danh mục <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{ma}" required placeholder="VD: AO_NAM">
                                <small class="text-muted">Mã này dùng để phân loại và không được trùng lặp.</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tên danh mục <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{ten}" required placeholder="VD: Áo Nam">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Danh mục cha</label>
                                <select class="form-select" th:field="*{danhMucChaId}">
                                    <option value="">-- Là danh mục cấp 1 (Cha) --</option>
                                    <option th:each="p : ${parents}" 
                                            th:if="${p.id != category.id}"
                                            th:value="${p.id}" 
                                            th:text="${p.ten}">Danh mục cha</option>
                                </select>
                                <small class="text-muted">Để trống nếu đây là danh mục cao nhất.</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" th:field="*{trangThai}">
                                    <option value="ACTIVE">Hoạt động (ACTIVE)</option>
                                    <option value="INACTIVE">Ngưng hoạt động (INACTIVE)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-4 pt-3 border-top">
                            <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">
                                <i class="fas fa-save me-2"></i> LƯU DANH MỤC
                            </button>
                            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary px-4 py-2 ms-2">HỦY BỎ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
