<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${voucher.id == null ? 'Thêm Voucher' : 'Sửa Voucher'} + ' - HANCOS'">Thêm Voucher - HANCOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #8b4d4d; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: white; min-height: 100vh; border-right: 1px solid #eee; padding: 2rem 1rem; }
        .main-content { padding: 2rem; }
        .card { border: none; border-radius: 10px; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
        .btn-primary:hover { background-color: #6d3a3a; border-color: #6d3a3a; }
        .form-label { font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar">
            <h3 class="text-center fw-bold mb-4" style="letter-spacing: 2px;">HANCOS</h3>
            <nav class="nav flex-column">
                <a class="nav-link text-dark" th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                <a class="nav-link text-dark" th:href="@{/admin/vouchers}"><i class="fas fa-ticket-alt me-2"></i> Voucher</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 main-content">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/vouchers}" class="text-decoration-none text-muted">Voucher</a></li>
                    <li class="breadcrumb-item active" aria-current="page" th:text="${voucher.id == null ? 'Thêm mới' : 'Chỉnh sửa'}">Thêm mới</li>
                </ol>
            </nav>

            <h2 class="fw-bold mb-4" th:text="${voucher.id == null ? 'THÊM VOUCHER MỚI' : 'CHỈNH SỬA VOUCHER'}">THÊM VOUCHER MỚI</h2>

            <div class="card">
                <div class="card-body p-4">
                    <form th:action="@{/admin/vouchers/save}" method="post" th:object="${voucher}">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{soLuongDaDung}">
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Mã Voucher</label>
                                <input type="text" class="form-control" th:field="*{ma}" placeholder="Ví dụ: GIAM10" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Loại giảm giá</label>
                                <select class="form-select" th:field="*{loai}">
                                    <option value="PERCENT">Phần trăm (%)</option>
                                    <option value="FIXED">Tiền mặt (₫)</option>
                                </select>
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label">Giá trị giảm</label>
                                <input type="number" class="form-control" th:field="*{giaTri}" required min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Giá trị giảm tối đa</label>
                                <input type="number" class="form-control" th:field="*{giaTriToiDa}" placeholder="Bỏ trống nếu không giới hạn">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Đơn tối thiểu</label>
                                <input type="number" class="form-control" th:field="*{donToiThieu}" placeholder="Bỏ trống nếu không giới hạn">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Số lượng mã</label>
                                <input type="number" class="form-control" th:field="*{soLuongToiDa}" placeholder="Bỏ trống nếu không giới hạn">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Trạng thái</label>
                                <select class="form-select" th:field="*{trangThai}">
                                    <option value="ACTIVE">Hoạt động</option>
                                    <option value="INACTIVE">Ngưng hoạt động</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Bắt đầu từ</label>
                                <input type="datetime-local" class="form-control" name="batDauStr" 
                                       th:value="${voucher.batDauLuc != null ? #temporals.format(voucher.batDauLuc, 'yyyy-MM-dd''T''HH:mm', 'UTC+7') : ''}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Kết thúc lúc</label>
                                <input type="datetime-local" class="form-control" name="ketThucStr"
                                       th:value="${voucher.ketThucLuc != null ? #temporals.format(voucher.ketThucLuc, 'yyyy-MM-dd''T''HH:mm', 'UTC+7') : ''}" required>
                            </div>

                            <div class="col-12 mt-4">
                                <hr>
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-2"></i> Lưu Voucher</button>
                                    <a th:href="@{/admin/vouchers}" class="btn btn-outline-secondary px-4">Hủy</a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
