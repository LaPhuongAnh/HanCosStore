<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${voucher.id == null ? 'Thêm Voucher' : 'Sửa Voucher'} + ' - HANCOS'">Thêm Voucher - HANCOS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/voucher-form.css}">
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar('vouchers')}"></div>

<div class="main-content">
    <header class="top-header">
        <div class="d-flex align-items-center">
            <a th:href="@{/admin/vouchers}" class="btn-action me-3" aria-label="Quay lại">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h4 class="fw-800 mb-0 text-uppercase letter-spacing-1"
                th:text="${voucher.id == null ? 'Thêm voucher' : 'Sửa voucher'}">Voucher</h4>
        </div>
        <div class="rounded-circle bg-soft-primary d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
            <i class="fas fa-ticket-alt"></i>
        </div>
    </header>

    <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-0 small mb-4" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body p-4">
            <form th:action="@{/admin/vouchers/save}" th:object="${voucher}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}">

                <div class="col-md-6">
                    <label class="form-label fw-700">Mã voucher <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{ma}" required
                           minlength="5" maxlength="20" pattern="[A-Za-z0-9]+"
                           title="5–20 ký tự, không chứa khoảng trắng hoặc ký tự đặc biệt"
                           placeholder="VD: VOUCHER10">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-700">Loại giảm giá <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{loai}" id="loaiGiam" onchange="toggleGiaTriToiDa()">
                        <option value="PERCENT">Phần trăm (%)</option>
                        <option value="FIXED">Tiền mặt (₫)</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-700">Giá trị giảm <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" name="giaTri"
                           th:value="${voucher.giaTri != null ? voucher.giaTri.intValue() : ''}" required min="1" step="1">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-700">Giá trị giảm tối đa <span id="giaTriToiDaStar" class="text-danger">*</span></label>
                    <input type="number" class="form-control" name="giaTriToiDa" id="giaTriToiDa"
                           th:value="${voucher.giaTriToiDa != null ? voucher.giaTriToiDa.intValue() : ''}" min="1" step="1">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-700">Đơn tối thiểu <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" name="donToiThieu" id="donToiThieu"
                           th:value="${voucher.donToiThieu != null ? voucher.donToiThieu.intValue() : ''}" required min="1" step="1">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-700">Số lượng mã <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" th:field="*{soLuongToiDa}" required min="1" step="1">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-700">Trạng thái</label>
                    <select class="form-select" th:field="*{trangThai}">
                        <option value="ACTIVE">Hoạt động</option>
                        <option value="INACTIVE">Ngưng hoạt động</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-700">Bắt đầu từ</label>
                    <input type="datetime-local" class="form-control" name="batDauStr"
                           th:value="${batDauStr != null ? batDauStr : (voucher.batDauLuc != null ? #temporals.format(voucher.batDauLuc, 'yyyy-MM-dd''T''HH:mm', 'UTC+7') : '')}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-700">Kết thúc lúc</label>
                    <input type="datetime-local" class="form-control" name="ketThucStr"
                           th:value="${ketThucStr != null ? ketThucStr : (voucher.ketThucLuc != null ? #temporals.format(voucher.ketThucLuc, 'yyyy-MM-dd''T''HH:mm', 'UTC+7') : '')}" required>
                </div>

                <div class="col-12 mt-3 pt-3 border-top">
                    <button type="submit" class="btn btn-primary px-4 fw-700">
                        <i class="fas fa-save me-2"></i> Lưu voucher
                    </button>
                    <a th:href="@{/admin/vouchers}" class="btn btn-outline-secondary px-4 ms-2">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/admin/voucher-form.js}"></script>
</body>
</html>
