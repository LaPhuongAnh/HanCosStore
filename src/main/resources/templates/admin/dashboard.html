<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HANCOS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/dashboard.css}">
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar('dashboard')}"></div>

<div class="main-content">
    <header class="top-header">
        <h4 class="fw-800 mb-0 text-uppercase letter-spacing-1">Dashboard</h4>
        <div class="d-flex align-items-center gap-3">
            <div class="text-end d-none d-sm-block">
                <p class="fw-700 mb-0" th:text="${session.LOGIN_USER.hoTen}">Admin</p>
                <small class="text-muted text-uppercase" style="font-size: 10px; letter-spacing: 1px;">Quản trị viên</small>
            </div>
            <div class="rounded-circle bg-soft-primary d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                <i class="fas fa-user-shield"></i>
            </div>
        </div>
    </header>

    <div class="row g-4">
        <!-- Stats -->
        <div class="col-md-3" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}">
            <div class="stat-card">
                <div class="stat-icon bg-soft-primary">
                    <i class="fas fa-wallet"></i>
                </div>
                <h6 class="text-muted small text-uppercase fw-700 letter-spacing-1 mb-2">Tổng doanh thu</h6>
                <h3 class="fw-800 mb-1" th:text="${#numbers.formatDecimal(stats.tongDoanhThu, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</h3>
                <p class="text-muted small mb-0"><i class="fas fa-check-circle me-1"></i> <span th:text="${stats.soDonHang}">0</span> đơn hoàn thành</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon bg-soft-success">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <h6 class="text-muted small text-uppercase fw-700 letter-spacing-1 mb-2">Doanh thu hôm nay</h6>
                <h3 class="fw-800 mb-1" th:text="${#numbers.formatDecimal(stats.doanhThuHomNay, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫</h3>
                <p class="text-muted small mb-0"><i class="fas fa-shopping-basket me-1"></i> <span th:text="${stats.soDonHomNay}">0</span> đơn mới</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon bg-soft-info">
                    <i class="fas fa-box"></i>
                </div>
                <h6 class="text-muted small text-uppercase fw-700 letter-spacing-1 mb-2">Sản phẩm đã bán</h6>
                <h3 class="fw-800 mb-1" th:text="${stats.soSanPhamDaBan}">0</h3>
                <p class="text-muted small mb-0"><i class="fas fa-truck me-1"></i> Đã giao cho khách</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon bg-soft-warning">
                    <i class="fas fa-user-friends"></i>
                </div>
                <h6 class="text-muted small text-uppercase fw-700 letter-spacing-1 mb-2">Khách hàng</h6>
                <h3 class="fw-800 mb-1" th:text="${stats.soKhachHang}">0</h3>
                <p class="text-muted small mb-0"><i class="fas fa-users me-1"></i> Tổng khách hàng</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="col-12 mt-5">
            <h5 class="fw-800 text-uppercase letter-spacing-1 mb-4">Thao tác nhanh</h5>
            <div class="row g-4">
                <div class="col-md-2">
                    <a th:href="@{/san-pham}" class="quick-action-card">
                        <i class="fas fa-box-open"></i>
                        <h5>Sản phẩm</h5>
                    </a>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/admin/orders}" class="quick-action-card">
                        <i class="fas fa-receipt"></i>
                        <h5>Đơn hàng</h5>
                    </a>
                </div>
                <div class="col-md-2" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}">
                    <a th:href="@{/admin/users}" class="quick-action-card">
                        <i class="fas fa-user-cog"></i>
                        <h5>Tài khoản</h5>
                    </a>
                </div>
                <div class="col-md-2" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}">
                    <a th:href="@{/admin/categories}" class="quick-action-card">
                        <i class="fas fa-tags"></i>
                        <h5>Danh mục</h5>
                    </a>
                </div>
                <div class="col-md-2" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}">
                    <a th:href="@{/them-san-pham}" class="quick-action-card">
                        <i class="fas fa-plus-circle"></i>
                        <h5>Thêm mới SP</h5>
                    </a>
                </div>
                <div class="col-md-2" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}">
                    <a th:href="@{/admin/vouchers}" class="quick-action-card">
                        <i class="fas fa-ticket-alt"></i>
                        <h5>Voucher</h5>
                    </a>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/}" class="quick-action-card">
                        <i class="fas fa-external-link-alt"></i>
                        <h5>Xem Website</h5>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
