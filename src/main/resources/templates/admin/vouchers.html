<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Voucher - HANCOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #8b4d4d; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: white; min-height: 100vh; border-right: 1px solid #eee; padding: 2rem 1rem; }
        .main-content { padding: 2rem; }
        .card { border: none; border-radius: 10px; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
        .nav-link { color: #333; font-weight: 500; margin-bottom: 0.5rem; border-radius: 5px; }
        .nav-link:hover { background: #f8f9fa; color: var(--primary-color); }
        .nav-link.active { background: var(--primary-color); color: white !important; }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
        .btn-primary:hover { background-color: #6d3a3a; border-color: #6d3a3a; }
        .badge-active { background-color: #d4edda; color: #155724; }
        .badge-inactive { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar">
            <h3 class="text-center fw-bold mb-4" style="letter-spacing: 2px;">HANCOS</h3>
            <nav class="nav flex-column">
                <a class="nav-link" th:href="@{/}"><i class="fas fa-home me-2"></i> Trang chủ</a>
                <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                <a class="nav-link" th:href="@{/san-pham}"><i class="fas fa-box me-2"></i> Sản phẩm</a>
                <a class="nav-link" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}" th:href="@{/admin/categories}"><i class="fas fa-list me-2"></i> Danh mục</a>
                <a class="nav-link active" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}" th:href="@{/admin/vouchers}"><i class="fas fa-ticket-alt me-2"></i> Voucher</a>
                <a class="nav-link" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}" th:href="@{/admin/thong-ke}"><i class="fas fa-chart-line me-2"></i> Thống kê</a>
                <a class="nav-link" th:href="@{/admin/orders}"><i class="fas fa-shopping-cart me-2"></i> Đơn hàng</a>
                <a class="nav-link" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}" th:href="@{/admin/users}"><i class="fas fa-users me-2"></i> Tài khoản</a>
                <hr>
                <a class="nav-link text-danger" th:href="@{/logout}"><i class="fas fa-sign-out-alt me-2"></i> Đăng xuất</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">QUẢN LÝ VOUCHER</h2>
                <a th:href="@{/admin/vouchers/add}" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}" class="btn btn-primary"><i class="fas fa-plus me-2"></i> Thêm Voucher</a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Mã</th>
                                <th>Loại</th>
                                <th>Giá trị</th>
                                <th>Số lượng</th>
                                <th>Thời gian</th>
                                <th>Trạng thái</th>
                                <th class="text-end pe-4" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="v : ${vouchers}">
                                <td class="ps-4 fw-bold" th:text="${v.ma}">VOUCHER10</td>
                                <td th:text="${v.loai == 'PERCENT' ? 'Phần trăm' : 'Tiền mặt'}">Phần trăm</td>
                                <td>
                                    <span th:if="${v.loai == 'PERCENT'}" th:text="${v.giaTri} + '%'">10%</span>
                                    <span th:if="${v.loai == 'FIXED'}" th:text="${#numbers.formatDecimal(v.giaTri, 0, 'COMMA', 0, 'POINT')} + '₫'">10.000₫</span>
                                </td>
                                <td>
                                    <span th:text="${v.soLuongDaDung}">0</span> / <span th:text="${v.soLuongToiDa != null ? v.soLuongToiDa : '∞'}">100</span>
                                </td>
                                <td style="font-size: 0.85rem;">
                                    <div>Bắt đầu: <span th:text="${#temporals.format(v.batDauLuc, 'dd/MM/yyyy HH:mm', 'UTC+7')}"></span></div>
                                    <div>Kết thúc: <span th:text="${#temporals.format(v.ketThucLuc, 'dd/MM/yyyy HH:mm', 'UTC+7')}"></span></div>
                                </td>
                                <td>
                                    <span class="badge rounded-pill px-3 py-2" 
                                          th:classappend="${v.trangThai == 'ACTIVE' ? 'badge-active' : 'badge-inactive'}"
                                          th:text="${v.trangThai}">ACTIVE</span>
                                </td>
                                <td class="text-end pe-4" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}">
                                    <a th:href="@{/admin/vouchers/edit/{id}(id=${v.id})}" class="btn btn-sm btn-outline-primary me-2"><i class="fas fa-edit"></i></a>
                                    <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteVoucher(' + ${v.id} + ')'"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(vouchers)}">
                                <td colspan="7" class="text-center py-4 text-muted">Chưa có voucher nào.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    function deleteVoucher(id) {
        Swal.fire({
            title: 'Xác nhận xóa?',
            text: "Voucher này sẽ bị xóa vĩnh viễn!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Xóa ngay',
            cancelButtonText: 'Hủy'
        }).then((result) => {
            if (result.isConfirmed) {
                fetch('/admin/vouchers/' + id, {
                    method: 'DELETE',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                }).then(res => res.text()).then(data => {
                    if (data === 'SUCCESS') {
                        Swal.fire('Đã xóa!', 'Voucher đã được xóa thành công.', 'success')
                            .then(() => location.reload());
                    } else {
                        Swal.fire('Lỗi!', 'Không thể xóa voucher: ' + data, 'error');
                    }
                });
            }
        });
    }
</script>
</body>
</html>
