<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Voucher - HANCOS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/vouchers.css}">
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar('vouchers')}"></div>

<div class="main-content">
    <header class="top-header">
        <h4 class="fw-800 mb-0 text-uppercase letter-spacing-1">Quản lý voucher</h4>
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/admin/vouchers/add}" class="btn btn-dark rounded-0 fw-700 text-uppercase small letter-spacing-1 px-4 py-2">
                <i class="fas fa-plus me-2"></i> Thêm voucher
            </a>
            <div class="rounded-circle bg-soft-primary d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                <i class="fas fa-ticket-alt"></i>
            </div>
        </div>
    </header>

    <div th:if="${successMessage}" class="alert alert-success border-0 rounded-0 small mb-4" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-0 small mb-4" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Mã</th>
                            <th>Loại</th>
                            <th>Giá trị</th>
                            <th>Số lượng</th>
                            <th>Thời gian</th>
                            <th>Trạng thái</th>
                            <th class="text-end pe-4" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${vouchers}">
                            <td class="ps-4 fw-700 text-dark" th:text="${v.ma}">VOUCHER10</td>
                            <td th:text="${v.loai == 'PERCENT' ? 'Phần trăm' : 'Tiền mặt'}">Phần trăm</td>
                            <td>
                                <span th:if="${v.loai == 'PERCENT'}" th:text="${v.giaTri} + '%'"></span>
                                <span th:if="${v.loai == 'FIXED'}" th:text="${#numbers.formatDecimal(v.giaTri, 0, 'COMMA', 0, 'POINT')} + '₫'">10.000₫</span>
                            </td>
                            <td>
                                <span th:text="${v.soLuongDaDung}">0</span> / <span th:text="${v.soLuongToiDa != null ? v.soLuongToiDa : '∞'}">100</span>
                            </td>
                            <td class="small text-muted">
                                <div>Bắt đầu: <span th:text="${#temporals.format(v.batDauLuc, 'dd/MM/yyyy HH:mm', 'UTC+7')}"></span></div>
                                <div>Kết thúc: <span th:text="${#temporals.format(v.ketThucLuc, 'dd/MM/yyyy HH:mm', 'UTC+7')}"></span></div>
                            </td>
                            <td>
                                <span class="badge rounded-pill px-3 py-2" 
                                      th:classappend="${v.trangThai == 'ACTIVE' ? 'badge-active' : 'badge-inactive'}"
                                      th:text="${v.trangThai}">ACTIVE</span>
                            </td>
                            <td class="text-end pe-4" th:if="${session.ROLES != null and #lists.contains(session.ROLES, 'ADMIN')}">
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/admin/vouchers/edit/{id}(id=${v.id})}" class="btn-action" title="Chỉnh sửa">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <button class="btn-action btn-delete" title="Vô hiệu hóa" th:onclick="'deleteVoucher(' + ${v.id} + ')'">
                                        <i class="fas fa-ban"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(vouchers)}">
                            <td colspan="7" class="text-center py-5 text-muted">Chưa có voucher nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/admin/vouchers.js}"></script>
</body>
</html>
