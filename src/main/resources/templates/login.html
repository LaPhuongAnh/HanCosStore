<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANCOS - Login & Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="auth-body">

<a th:href="@{/}" class="back-home">
    <i class="fas fa-arrow-left"></i> Trở về trang chủ
</a>

<div class="login-container" id="container">
    <!-- Sign Up Form -->
    <div class="form-container sign-up">
        <form th:action="@{/register}" method="post">
            <div class="logo">
                <i class="fas fa-cube"></i> HANCOS
            </div>
            <h2 class="login-title">Create Account</h2>
            <div class="social-login">
                <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <span class="divider">or use your email for registration</span>
            
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control" name="hoTen" required placeholder="Name">
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user-circle"></i></span>
                <input type="text" class="form-control" name="tenDangNhap" required placeholder="Username">
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control" name="email" required placeholder="Email">
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <input type="text" class="form-control" name="soDienThoai" required placeholder="Phone">
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" name="matKhau" required placeholder="Password">
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" name="xacNhanMatKhau" required placeholder="Confirm Password">
            </div>
            
            <!-- Button đăng ký ở đây -->
            <button type="submit" class="btn btn-login">Sign Up</button>
        </form>
    </div>

    <!-- Sign In Form -->
    <div class="form-container sign-in">
        <form th:action="@{/login}" method="post">
            <div class="logo">
                <i class="fas fa-cube"></i> HANCOS
            </div>
            <h2 class="login-title">Sign In</h2>
            <div class="social-login">
                <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <span class="divider">or use your email password</span>
            
            <input type="hidden" name="next" th:value="${next}">
            
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="text" class="form-control" name="tenDangNhap" required placeholder="Email hoặc tên đăng nhập">
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" name="matKhau" required placeholder="Password">
            </div>
            <div class="forgot-password">
                <a th:href="@{/forgot-password}">Forget Your Password?</a>
            </div>
            <button type="submit" class="btn btn-login">Sign In</button>
        </form>
    </div>

    <!-- Toggle Container -->
    <div class="toggle-container">
        <div class="toggle">
            <div class="toggle-panel toggle-left">
                <h1 class="welcome-title">Welcome Back!</h1>
                <p class="welcome-text">Đăng nhập để mua sắm nào</p>
                <button class="btn-signin" id="login">Sign In</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1 class="welcome-title">Hello, Friend!</h1>
                <p class="welcome-text">Hãy đăng ký để bắt đầu</p>
                <button class="btn-signin" id="register">Sign Up</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const container = document.getElementById('container');
const registerBtn = document.getElementById('register');
const loginBtn = document.getElementById('login');

registerBtn.addEventListener('click', () => {
    container.classList.add("active");
});

loginBtn.addEventListener('click', () => {
    container.classList.remove("active");
});
</script>
</body>
</html>
