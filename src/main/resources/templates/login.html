<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HANCOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #333;
        }
        .btn-login {
            background-color: #8b4d4d;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #6d3838;
            color: white;
        }
        .form-control:focus {
            border-color: #8b4d4d;
            box-shadow: 0 0 0 0.2rem rgba(139, 77, 77, 0.25);
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2 class="login-title">HANCOS</h2>
    
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" name="next" th:value="${next}">
        
        <div class="mb-3">
            <label for="tenDangNhap" class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control" id="tenDangNhap" name="tenDangNhap" required placeholder="Nhập tên đăng nhập">
            </div>
        </div>
        
        <div class="mb-3">
            <label for="matKhau" class="form-label">Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" id="matKhau" name="matKhau" required placeholder="Nhập mật khẩu">
            </div>
        </div>
        
        <button type="submit" class="btn btn-login">Đăng nhập</button>
    </form>
    
    <div class="text-center mt-4">
        <p class="small text-muted">Chưa có tài khoản? <a th:href="@{/register}" class="text-decoration-none" style="color: #8b4d4d; font-weight: 600;">Đăng ký ngay</a></p>
        <a th:href="@{/}" class="text-decoration-none text-muted small"><i class="fas fa-arrow-left me-1"></i> Quay lại trang chủ</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
