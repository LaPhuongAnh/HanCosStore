<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Sản Phẩm - HANCOS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/addsanpham.css}">
</head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar('products')}"></div>

<div class="main-content">

<!-- Banner -->
<div class="banner">
    <h1>THÊM SẢN PHẨM MỚI</h1>
    <p>Quản lý sản phẩm - Tạo mới và cập nhật thông tin</p>
</div>

<!-- Container -->
<div class="container">
    <div class="form-container">
        <form id="productForm" th:action="@{/them-san-pham}" method="post">
            <div class="alert alert-success" id="successAlert" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-error" id="errorAlert" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p class="loading-text">ĐANG XỬ LÝ...</p>
            </div>
            <input type="hidden" name="danhMucId" id="selectedDanhMucId">
            <!-- Thông tin cơ bản -->
            <div class="section">
                <h2 class="section-title">Thông Tin Cơ Bản</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label>Mã Sản Phẩm <span class="required">*</span></label>
                        <input type="text" name="maSanPham" id="maSanPham" required placeholder="AO_PHAO_AKP" oninput="updateAllSKUs()">
                    </div>
                    <div class="form-group">
                        <label>Tên Sản Phẩm <span class="required">*</span></label>
                        <input type="text" name="ten" id="ten" required placeholder="Áo Phao Atino Jacket">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Chất Liệu</label>
                        <input type="text" name="chatLieu" id="chatLieu" placeholder="100% Polyester">
                    </div>
                    <div class="form-group">
                        <label>Giới Tính</label>
                        <select name="gioiTinh" id="gioiTinh">
                            <option value="UNISEX">Unisex</option>
                            <option value="NAM">Nam</option>
                            <option value="NU">Nữ</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Danh Mục Cha</label>
                        <select id="parentDanhMucId" onchange="loadChildren()">
                            <option value="">-- Chọn danh mục cha --</option>
                            <option th:each="dm : ${parentDanhMuc}"
                                    th:value="${dm.id}"
                                    th:text="${dm.ten}">Danh mục cha</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Danh Mục Con</label>
                        <select name="danhMucId" id="danhMucId" disabled>
                            <option value="">-- Chọn danh mục con --</option>
                        </select>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>Mô Tả Ngắn</label>
                        <textarea name="moTaNgan" id="moTaNgan" rows="3" placeholder="Mô tả ngắn gọn về sản phẩm..."></textarea>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>Mô Tả Chi Tiết</label>
                        <textarea name="moTa" id="moTa" rows="5" placeholder="Mô tả chi tiết về sản phẩm..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Biến thể -->
            <div class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h2 class="section-title" style="margin-bottom: 0;">Biến Thể Sản Phẩm</h2>
                    <button type="button" class="btn btn-add" onclick="addVariant()" style="margin-top: 0;">
                        <i class="fas fa-plus"></i> Thêm Biến Thể
                    </button>
                </div>
                <div id="variantsList"></div>
            </div>

            <!-- Hình ảnh sản phẩm -->
            <div class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h2 class="section-title" style="margin-bottom: 0;">Hình Ảnh Sản Phẩm</h2>
                    <button type="button" class="btn btn-add" onclick="addImage()" style="margin-top: 0;">
                        <i class="fas fa-image"></i> Thêm Hình Ảnh
                    </button>
                </div>
                <div id="imagePasteArea"
                     tabindex="0"
                     style="margin-bottom: 16px; padding: 12px; border: 1px dashed #b8b8b8; border-radius: 6px; background: #fafafa; color: #666; font-size: 13px;">
                    Bam vao day roi nhan Ctrl + V de dan anh tu clipboard (ho tro dan nhieu anh).
                </div>
                <div id="imagesList"></div>
            </div>

            <!-- Hình ảnh theo màu -->
            <div class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h2 class="section-title" style="margin-bottom: 0;">Hình Ảnh Theo Màu Sắc</h2>
                    <button type="button" class="btn btn-add" onclick="addColorImage()" style="margin-top: 0;">
                        <i class="fas fa-palette"></i> Thêm Hình Màu
                    </button>
                </div>
                <div id="colorImagesList"></div>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <button type="button" class="btn btn-info" onclick="syncColors()" style="background: #5dade2; color: white; border: none;">
                    <i class="fas fa-sync"></i> Đồng Bộ Màu
                </button>
                <button type="button" class="btn btn-secondary" onclick="resetForm()">
                    <i class="fas fa-redo"></i> Làm Mới
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu Sản Phẩm
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    window.PARENT_DANH_MUC_TREE = /*[[${parentDanhMucTree}]]*/ [];
</script>
<script th:src="@{/js/addsanpham.js}"></script>
</div>
</body>
</html>
