<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đặt lại mật khẩu - Hancos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/reset-password.css}">
</head>
<body>

<div class="container" style="min-height: 100vh; display: flex; align-items: center;">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center" style="width: 56px; height: 56px;">
                            <i class="fas fa-key"></i>
                        </div>
                        <h4 class="fw-700 mt-3">Đặt lại mật khẩu</h4>
                        <p class="text-muted small mb-0">Nhập mật khẩu mới để hoàn tất</p>
                    </div>

                    <div id="alertBox" class="alert d-none" role="alert"></div>

                    <form id="resetForm">
                        <input type="hidden" id="token" name="token" th:value="${token}">
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-600">Mật khẩu mới</label>
                            <input type="password" class="form-control" name="newPassword" required minlength="6" placeholder="Nhập mật khẩu mới">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đặt lại mật khẩu</button>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/login}" class="small text-muted">Quay lại đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/reset-password.js}"></script>
</body>
</html>
